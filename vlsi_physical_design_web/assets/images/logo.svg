<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title>VH fire logo</title>
  <desc>Round navy badge with orange fire and VH monogram.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20365c"/>
      <stop offset="100%" stop-color="#0f1d35"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#173058"/>
      <stop offset="100%" stop-color="#0a1426"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="28%">
      <stop offset="0%" stop-color="#ffb36b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6a2d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flameOuter" x1="0.35" y1="0" x2="0.65" y2="1">
      <stop offset="0%" stop-color="#ff7f30"/>
      <stop offset="100%" stop-color="#f03c1f"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0.35" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffe38a"/>
      <stop offset="100%" stop-color="#ffbf47"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#10192b" flood-opacity="0.24"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="410" fill="url(#ring)"/>
    <circle cx="512" cy="512" r="372" fill="url(#core)"/>
  </g>
  <ellipse cx="512" cy="290" rx="180" ry="120" fill="url(#glow)"/>
  <path d="M512 180c62 48 114 144 114 235 0 87-52 147-116 190 18-34 22-71 4-111-14-32-44-58-44-101 0-70 42-124 42-213z" fill="url(#flameOuter)"/>
  <path d="M516 246c36 32 66 88 66 143 0 59-28 104-66 134-10-24-11-49-2-76 8-24 3-43-17-72-18-28-14-82 19-129z" fill="url(#flameInner)"/>
  <text x="512" y="680" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="254" font-weight="700" letter-spacing="-18" fill="#f7faff" stroke="#173058" stroke-width="10">VH</text>
</svg>